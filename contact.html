<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - EmoSense</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
  <style>
    .trial-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 6vw;
      background: var(--bg-main);
      position: relative;
      overflow: hidden;
    }

    .trial-bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .trial-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 50px;
      max-width: 520px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.4);
      animation: fadeSlideUp 0.8s 0.2s ease both;
    }

    .trial-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.1;
      text-align: center;
    }

    .trial-sub {
      font-size: 15px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .form-control,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: all 0.2s;
      background: var(--bg-main);
      color: var(--text-primary);
    }

    .form-control::placeholder,
    .form-select::placeholder,
    .form-textarea::placeholder {
      color: var(--text-muted);
    }

    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-control:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--text-secondary);
      background: var(--bg-hover);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .row {
      display: flex;
      gap: 16px;
    }

    .col {
      flex: 1;
    }

    .btn-submit {
      width: 100%;
      background: var(--text-primary);
      color: var(--text-inverse);
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background: var(--text-secondary);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
    }

    .trial-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .trial-footer a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .trial-footer a:hover {
      color: var(--text-secondary);
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <nav id="main-nav">
    <a href="index.html" class="logo">
      <span class="logo-dot"></span>
      EmoSense
    </a>
    <div class="nav-right">
      <a href="login.html" class="nav-login">Sign in</a>
      <a href="start-free-trial.html" class="nav-cta">Start free trial</a>
    </div>
  </nav>

  <section class="trial-hero">
    <div class="trial-bg-glow"></div>
    <div class="trial-card">
      <h1 class="trial-title">Get in touch</h1>
      <p class="trial-sub">Request early access or ask us anything. We'll get back to you within 24 hours.</p>

      <form action="#" id="contact-form">
        <div class="row">
          <div class="form-group col">
            <label for="fname">First Name</label>
            <input type="text" id="fname" class="form-control" placeholder="Jane" required>
          </div>
          <div class="form-group col">
            <label for="lname">Last Name</label>
            <input type="text" id="lname" class="form-control" placeholder="Doe" required>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" class="form-control" placeholder="jane@company.com" required>
        </div>
        <div class="form-group">
          <label for="inquiry">What can we help you with?</label>
          <select id="inquiry" class="form-select" required>
            <option value="" disabled selected>Select an option...</option>
            <option value="early_access">Request Early Access</option>
            <option value="sales">Sales & Enterprise Pricing</option>
            <option value="support">Technical Support</option>
            <option value="other">Other Inquiry</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" class="form-textarea" placeholder="Tell us a bit about your use case..."></textarea>
        </div>
        <div id="contact-success" style="display:none; padding:15px; margin-bottom:20px; background:rgba(67, 97, 238, 0.15); border:1px solid #4361EE; border-radius:12px; color:var(--text-primary); text-align:center; font-weight:500;">
          <span style="font-size:18px; margin-right:8px; color:#4361EE;">✓</span> Message Sent Successfully! We will get back to you soon.
        </div>
        <button type="submit" class="btn-submit" id="contact-btn">Send Message</button>
      </form>

      <div class="trial-footer">
        Looking for documentation? <a href="#">Visit our Help Center</a>
      </div>
    </div>
  </section>

  <script src="auth.js"></script>
  <script>
    if (document.getElementById('contact-form') && window.db) {
      document.getElementById('contact-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('contact-btn');
        btn.textContent = 'Sending...';
        btn.disabled = true;
        btn.style.opacity = '0.7';
        
        const fname = document.getElementById('fname').value;
        const lname = document.getElementById('lname').value;
        const email = document.getElementById('email').value;
        const inquiry = document.getElementById('inquiry').value;
        const message = document.getElementById('message').value;

        window.db.collection('ContactMessages').add({
          firstName: fname,
          lastName: lname,
          email: email,
          inquiry: inquiry,
          message: message, // Can be empty but that's fine
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).then(function() {
          document.getElementById('contact-success').style.display = 'block';
          btn.style.display = 'none';
          document.getElementById('contact-form').reset();
        }).catch(function(error) {
          console.error("Error adding document: ", error);
          alert("Error sending message! Please verify your database connection.");
          btn.textContent = 'Send Message';
          btn.disabled = false;
          btn.style.opacity = '1';
        });
      });
    }
  </script>
</body>

</html>
