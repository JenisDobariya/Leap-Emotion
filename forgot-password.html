<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - EmoSense</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
  <style>
    .trial-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 6vw;
      background: var(--bg-main);
      position: relative;
      overflow: hidden;
    }

    .trial-bg-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .trial-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 50px;
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.4);
      animation: fadeSlideUp 0.8s 0.2s ease both;
    }

    .trial-title {
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: var(--text-primary);
      margin-bottom: 12px;
      line-height: 1.1;
      text-align: center;
    }

    .trial-sub {
      font-size: 15px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
      font-weight: 300;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .form-control {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: all 0.2s;
      background: var(--bg-main);
      color: var(--text-primary);
    }

    .form-control::placeholder {
      color: var(--text-muted);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--text-secondary);
      background: var(--bg-hover);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    .btn-submit {
      width: 100%;
      background: var(--text-primary);
      color: var(--text-inverse);
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background: var(--text-secondary);
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.4);
    }

    .trial-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .trial-footer a {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .trial-footer a:hover {
      color: var(--text-secondary);
    }

    .success-msg {
      display: none;
      background: var(--bg-hover);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <nav id="main-nav">
    <a href="index.html" class="logo">
      <span class="logo-dot"></span>
      EmoSense
    </a>
    <div class="nav-right">
      <a href="login.html" class="nav-login">Sign in</a>
    </div>
  </nav>

  <section class="trial-hero">
    <div class="trial-bg-glow"></div>
    <div class="trial-card">
      <h1 class="trial-title">Reset your password</h1>
      <p class="trial-sub">Enter your email and we'll send you a link to reset your password.</p>

      <div id="auth-error"
        style="display:none; background: rgba(255, 100, 100, 0.1); color: #ff8b8b; border: 1px solid #ff8b8b; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px;">
      </div>
      <div id="auth-success" class="success-msg"></div>

      <form id="reset-form">
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" class="form-control" placeholder="jane@company.com" required>
        </div>
        <button type="submit" class="btn-submit">Send Reset Link</button>
      </form>

      <div class="trial-footer">
        Remember your password? <a href="login.html">Back to sign in</a>
      </div>
    </div>
  </section>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC3YxeC7aLNsftjMIrZDZJwnfAf6Q_ByCg",
      authDomain: "leap-emotion.firebaseapp.com",
      projectId: "leap-emotion",
      storageBucket: "leap-emotion.firebasestorage.app",
      messagingSenderId: "518255542758",
      appId: "1:518255542758:web:563def6409131579589627"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();

    document.getElementById('reset-form').addEventListener('submit', function (e) {
      e.preventDefault();

      var errorDiv = document.getElementById('auth-error');
      var successDiv = document.getElementById('auth-success');
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      var email = document.getElementById('email').value;

      auth.sendPasswordResetEmail(email)
        .then(function () {
          successDiv.style.display = 'block';
          successDiv.textContent = '✓ Password reset email sent! Check your inbox for a link to reset your password.';
          document.getElementById('reset-form').reset();
        })
        .catch(function (error) {
          errorDiv.style.display = 'block';
          if (error.code === 'auth/user-not-found') {
            errorDiv.textContent = 'No account found with this email address.';
          } else if (error.code === 'auth/invalid-email') {
            errorDiv.textContent = 'Please enter a valid email address.';
          } else {
            errorDiv.textContent = error.message;
          }
        });
    });
  </script>
</body>

</html>
