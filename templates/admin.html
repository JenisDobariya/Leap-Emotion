<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Leap Emotion</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=6">
    <style>
        body { background: var(--bg-main); }

        .admin-wrap {
            max-width: 860px;
            margin: 0 auto;
            padding: 100px 24px 80px;
        }

        .admin-title {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .admin-sub {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .request-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 14px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            transition: box-shadow 0.2s;
        }

        .request-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.3);
        }

        .client-email {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: block;
        }

        .client-company {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-bottom: 3px;
            display: block;
        }

        .client-date {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
        }

        .key-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .key-input {
            padding: 10px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            min-width: 220px;
        }

        .key-input:focus {
            border-color: var(--text-secondary);
        }

        .btn-approve {
            padding: 10px 20px;
            border-radius: 100px;
            background: var(--text-primary);
            color: var(--text-inverse);
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .btn-approve:hover { opacity: 0.8; }
        .btn-approve:disabled { opacity: 0.4; cursor: not-allowed; }

        .status-msg {
            font-size: 12px;
            margin-top: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 15px;
        }

        .loading-state {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 14px;
            padding: 20px 0;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--text-secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .badge-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-hover);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 12px;
            padding: 2px 10px;
            color: var(--text-secondary);
            margin-left: 10px;
            vertical-align: middle;
        }

        .approved-card {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <nav id="main-nav">
        <a href="{{ url_for('index') }}" class="logo">
            <span class="logo-dot"></span>
            Leap Emotion
        </a>
        <div class="nav-right">
            <a href="{{ url_for('logout') }}" style="font-size:13px; color:var(--text-secondary); text-decoration:none;">Sign out</a>
        </div>
    </nav>

    <div class="admin-wrap">
        <h1 class="admin-title">
            Pending License Requests
            <span class="badge-count" id="count-badge">—</span>
        </h1>
        <p class="admin-sub">Approve requests by entering a license key and clicking "Send to Client".</p>

        <div id="requests-list">
            <div class="loading-state">
                <div class="spinner"></div>
                Loading requests…
            </div>
        </div>
    </div>

    <script>
        var listDiv = document.getElementById('requests-list');
        var countBadge = document.getElementById('count-badge');

        function formatDate(ts) {
            if (!ts) return '';
            try { return new Date(ts).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
            catch(e) { return ts; }
        }

        function loadRequests() {
            fetch('/admin/pending-requests', { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    listDiv.innerHTML = '';

                    if (data.error) {
                        listDiv.innerHTML = '<div class="empty-state" style="color:#eb5757;">Error: ' + data.error + '</div>';
                        return;
                    }

                    var reqs = data.requests || [];
                    countBadge.textContent = reqs.length;

                    if (reqs.length === 0) {
                        listDiv.innerHTML = '<div class="empty-state">✅ No pending requests. All caught up!</div>';
                        return;
                    }

                    reqs.forEach(function(req) {
                        var card = document.createElement('div');
                        card.className = 'request-card';
                        card.id = 'card-' + req.id;
                        card.innerHTML =
                            '<div style="flex:1;">' +
                                '<div class="client-email">' + (req.email || '—') + '</div>' +
                                '<div class="client-company">🏢 ' + (req.company || 'Personal Account') + '</div>' +
                                '<div style="font-size:12px; color:var(--text-primary); margin-top:6px; margin-bottom:2px;">' + 
                                    '🎉 ' + (req.eventName || 'Unnamed Event') + 
                                '</div>' +
                                '<div style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">' + 
                                    '📅 ' + (req.eventDate || 'No date set') + 
                                '</div>' +
                                '<div class="client-date">Requested on ' + formatDate(req.date) + '</div>' +
                            '</div>' +
                            '<div>' +
                                '<div class="key-form">' +
                                    '<input type="text" id="key-' + req.id + '" class="key-input" placeholder="XXXX-XXXX-XXXX-XXXX">' +
                                    '<button class="btn-approve">Send to Client</button>' +
                                '</div>' +
                                '<div class="status-msg" id="msg-' + req.id + '"></div>' +
                            '</div>';
                        
                        // Attach handler safely
                        var approveBtn = card.querySelector('.btn-approve');
                        approveBtn.onclick = function() {
                            approveKey(req.id, req.eventName, req.eventDate, req.email);
                        };
                        listDiv.appendChild(card);
                    });
                })
                .catch(function(err) {
                    listDiv.innerHTML = '<div class="empty-state" style="color:#eb5757;">Failed to load requests. Check your connection.</div>';
                    console.error(err);
                });
        }

        function approveKey(docId, eventName, eventDate, email) {
            var keyInput = document.getElementById('key-' + docId);
            var msgEl    = document.getElementById('msg-' + docId);
            var btn      = keyInput.parentElement.querySelector('.btn-approve');
            var key      = keyInput.value.trim();

            if (!key) {
                msgEl.style.color = '#eb5757';
                msgEl.textContent = 'Please enter a license key first.';
                return;
            }

            btn.textContent = 'Sending…';
            btn.disabled = true;
            msgEl.textContent = '';

            fetch('/admin/approve-key', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ 
                    docId: docId, 
                    licenseKey: key,
                    eventName: eventName,
                    eventDate: eventDate,
                    email: email
                })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.status === 'success') {
                    var card = document.getElementById('card-' + docId);
                    if (card) card.classList.add('approved-card');
                    btn.textContent = 'Approved ✓';
                    msgEl.style.color = '#6fcf97';
                    msgEl.textContent = 'Key sent! The client\'s dashboard will now show the key.';
                    // Refresh count
                    var current = parseInt(countBadge.textContent) || 1;
                    countBadge.textContent = Math.max(0, current - 1);
                } else {
                    btn.textContent = 'Send to Client';
                    btn.disabled = false;
                    msgEl.style.color = '#eb5757';
                    msgEl.textContent = data.error || 'Failed to approve. Try again.';
                }
            })
            .catch(function(err) {
                btn.textContent = 'Send to Client';
                btn.disabled = false;
                msgEl.style.color = '#eb5757';
                msgEl.textContent = 'Network error. Please retry.';
                console.error(err);
            });
        }

        // Load on page ready
        loadRequests();

        // Auto-refresh every 30 seconds
        setInterval(loadRequests, 30000);
    </script>
</body>

</html>
