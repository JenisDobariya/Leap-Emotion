            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .client-info {
            flex: 1;
            min-width: 200px;
        }

        .key-form {
            display: flex;
            gap: 10px;
        }

        .key-input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: white;
            outline: none;

        function loadRequests() {
            const db = firebase.firestore();
            const listDiv = document.getElementById('requests-list');

            db.collection("license_requests").where("status", "==", "pending").onSnapshot((snapshot) => {
                listDiv.innerHTML = "";
                if (snapshot.empty) {
                    listDiv.innerHTML = "No pending requests.";
                    return;
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.className = "request-card";
                    card.innerHTML = `
            <div class="client-info">
              <div style="font-weight: 500; color: var(--text-primary);">${data.email}</div>
            </div>
            <div class="key-form">
              <input type="text" id="key-${doc.id}" class="key-input" placeholder="Enter generated key...">
              <button onclick="approveKey('${doc.id}')" class="btn-primary" style="padding: 10px 20px; font-size: 13px;">Send to Client</button>
            </div>
          `;
                    listDiv.appendChild(card);
                });
            });
        }

        function approveKey(requestId) {
            const keyInput = document.getElementById(`key-${requestId}`).value.trim();
            if (!keyInput) { alert("Please enter a key first."); return; }

            const db = firebase.firestore();
            // Get the currently logged-in admin's email
            const adminEmail = firebase.auth().currentUser.email;

            db.collection("license_requests").doc(requestId).update({
                status: "approved",
                licenseKey: keyInput,
                approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
                acceptedBy: adminEmail // <-- ADDS THE ADMIN'S EMAIL
            })
                .then(() => {
                    alert("Key saved to request! It will now appear on the client's dashboard.");
                })
                .catch((error) => console.error("Error approving key:", error));
        }
